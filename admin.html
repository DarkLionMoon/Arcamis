<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Arcamis Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a0e;--bg2:#0c0f15;--bg3:#10141c;
  --gold:#c89b3c;--gold2:#d4aa4a;--gold3:#e8c86a;
  --text:#a08848;--text2:#786438;--text3:#483c1c;--white:#f0e6d2;--parch:#c4a862;
  --bdr:rgba(200,155,60,.12);--bdr2:rgba(200,155,60,.22);
  --red:rgba(200,60,50,.85);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif}
body{display:flex;flex-direction:column;min-height:100vh}

/* ── TOPBAR ── */
#topbar{
  height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;background:rgba(6,7,12,.9);
  border-bottom:1px solid var(--bdr2);
  backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;
}
.tb-logo{font-family:'Cinzel',serif;font-size:13px;font-weight:900;letter-spacing:.22em;color:var(--gold3);display:flex;align-items:center;gap:10px}
.tb-badge{font-size:8px;letter-spacing:.2em;background:rgba(200,155,60,.12);border:1px solid var(--bdr2);color:var(--gold2);padding:3px 10px}
#tb-user{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;color:var(--text2);display:flex;align-items:center;gap:14px}
#logout-btn{
  padding:6px 16px;border:1px solid var(--bdr);background:transparent;
  color:var(--text2);font-family:'Cinzel',serif;font-size:8px;letter-spacing:.15em;
  cursor:pointer;transition:.2s;text-transform:uppercase;
}
#logout-btn:hover{border-color:var(--red);color:#ff6060}

/* ── LOGIN ── */
#login-screen{
  flex:1;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 120% 100% at 50% 0%,#131008 0%,#080a0e 60%);
}
.login-box{
  width:380px;padding:44px 40px;
  background:rgba(10,12,18,.97);border:1px solid var(--bdr2);
  box-shadow:0 24px 80px rgba(0,0,0,.8),0 0 0 1px rgba(200,155,60,.05);
  position:relative;overflow:hidden;
}
.login-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold2),transparent);
}
.login-eyebrow{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.35em;color:var(--gold);opacity:.6;text-transform:uppercase;margin-bottom:10px;text-align:center}
.login-title{font-family:'Cinzel',serif;font-size:22px;font-weight:900;color:var(--white);letter-spacing:.06em;text-align:center;margin-bottom:32px}
.login-field{margin-bottom:18px}
.login-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.2em;color:var(--text2);text-transform:uppercase;display:block;margin-bottom:7px}
.login-input{
  width:100%;padding:11px 14px;background:rgba(0,0,0,.4);
  border:1px solid var(--bdr);color:var(--white);
  font-family:'Crimson Pro',serif;font-size:15px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.login-input:focus{border-color:var(--gold);box-shadow:0 0 0 1px rgba(200,155,60,.1)}
.login-btn{
  width:100%;padding:13px;margin-top:8px;
  background:linear-gradient(135deg,rgba(200,155,60,.18),rgba(200,155,60,.08));
  border:1px solid var(--gold);color:var(--gold2);
  font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:.2em;
  cursor:pointer;transition:.2s;text-transform:uppercase;
}
.login-btn:hover{background:rgba(200,155,60,.25);box-shadow:0 0 24px rgba(200,155,60,.2)}
.login-btn:disabled{opacity:.4;cursor:not-allowed}
.login-err{
  margin-top:14px;padding:10px 14px;
  background:rgba(180,40,30,.12);border:1px solid rgba(180,40,30,.3);
  color:#ff7060;font-size:13px;text-align:center;display:none;
}

/* ── ADMIN PANEL ── */
#admin-panel{flex:1;padding:32px;max-width:1400px;margin:0 auto;width:100%;display:none}
.panel-header{margin-bottom:32px}
.panel-title{font-family:'Cinzel',serif;font-size:18px;font-weight:900;color:var(--white);letter-spacing:.06em;margin-bottom:6px}
.panel-sub{font-size:14px;color:var(--text3);font-style:italic}
.panel-section{margin-bottom:48px}
.section-head{
  display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:12px;
  border-bottom:1px solid var(--bdr);
  font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:.22em;color:var(--gold2);text-transform:uppercase;
}
.section-head::before{content:'◆';font-size:6px;color:var(--gold)}

/* ── GALLERY GRID ── */
#gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:16px;
}
.pg-card{
  background:rgba(10,12,18,.97);border:1px solid var(--bdr);
  overflow:hidden;position:relative;
  transition:border-color .2s;
}
.pg-card:hover{border-color:var(--bdr2)}
.pg-card-preview{
  height:140px;position:relative;overflow:hidden;
  background:#0a0c14;display:flex;align-items:center;justify-content:center;
  font-size:40px;
}
.pg-card-preview-img{
  position:absolute;inset:0;background-size:cover;background-position:center top;
  transition:transform .3s;filter:brightness(.8);
}
.pg-card:hover .pg-card-preview-img{transform:scale(1.04)}
.pg-card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(0deg,rgba(4,6,14,.95) 0%,transparent 60%);
}
.pg-card-tag{
  position:absolute;top:8px;left:8px;
  font-family:'Cinzel',serif;font-size:7px;letter-spacing:.12em;
  padding:2px 8px;border:1px solid rgba(200,155,60,.4);
  background:rgba(0,0,0,.7);color:var(--gold2);
}
.pg-card-custom-badge{
  position:absolute;top:8px;right:8px;
  font-family:'Cinzel',serif;font-size:7px;letter-spacing:.1em;
  padding:2px 7px;background:rgba(60,180,80,.15);border:1px solid rgba(60,180,80,.4);
  color:#6dca7a;display:none;
}
.pg-card-custom-badge.vis{display:block}
.pg-card-body{padding:12px 14px 14px}
.pg-card-name{
  font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--parch);
  margin-bottom:10px;line-height:1.3;
}
/* Cover input area */
.cover-input-wrap{display:flex;flex-direction:column;gap:6px}
.cover-input{
  width:100%;padding:7px 10px;background:rgba(0,0,0,.4);
  border:1px solid var(--bdr);color:var(--white);
  font-family:'Crimson Pro',serif;font-size:13px;outline:none;
  transition:border-color .2s;
}
.cover-input:focus{border-color:var(--gold)}
.cover-input::placeholder{color:var(--text3);font-style:italic}
.cover-actions{display:flex;gap:6px}
.cover-btn{
  flex:1;padding:6px 10px;font-family:'Cinzel',serif;font-size:8px;
  letter-spacing:.1em;cursor:pointer;transition:.15s;text-transform:uppercase;border:1px solid;
}
.cover-btn-save{
  background:rgba(200,155,60,.1);border-color:rgba(200,155,60,.4);color:var(--gold2);
}
.cover-btn-save:hover{background:rgba(200,155,60,.2);border-color:var(--gold)}
.cover-btn-remove{
  background:rgba(180,40,30,.08);border-color:rgba(180,40,30,.25);color:rgba(220,80,70,.7);
  flex:0 0 auto;padding:6px 10px;
}
.cover-btn-remove:hover{background:rgba(180,40,30,.18);border-color:rgba(220,80,70,.5)}
.cover-status{
  font-size:11px;height:16px;transition:opacity .3s;
  font-style:italic;
}
.cover-status.ok{color:#6dca7a}
.cover-status.err{color:#ff7060}

/* Loading */
.admin-loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px;gap:16px;color:var(--text3);font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:.2em;
}
.spin{
  width:30px;height:30px;border:2px solid rgba(200,155,60,.15);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:rgba(4,5,14,.98);border:1px solid var(--bdr2);
  color:var(--parch);font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;
  padding:10px 22px;box-shadow:0 8px 32px rgba(0,0,0,.7);
  opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:999;
}
#toast.vis{opacity:1}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="tb-logo">
    ⚔ ARCAMIS
    <span class="tb-badge">ADMIN</span>
  </div>
  <div id="tb-user" style="display:none">
    <span id="tb-label">Pannello di controllo</span>
    <button id="logout-btn" onclick="doLogout()">Esci</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-eyebrow">Accesso riservato</div>
    <div class="login-title">⚔ Admin Arcamis</div>
    <div class="login-field">
      <label class="login-label" for="pwd-input">Password</label>
      <input class="login-input" id="pwd-input" type="password"
        placeholder="Inserisci la password…"
        onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Accedi</button>
    <div class="login-err" id="login-err">Password errata. Riprova.</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="panel-header">
    <div class="panel-title">Pannello di controllo</div>
    <div class="panel-sub">Gestisci le immagini di copertina della Galleria PG</div>
  </div>

  <div class="panel-section">
    <div class="section-head">Galleria PG — Copertine</div>
    <div id="gallery-grid">
      <div class="admin-loading">
        <div class="spin"></div>
        Caricamento schede…
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ════ STATE ════ */
var _authed = false;
var _covers = {};
var _pages  = [];

/* ════ INIT ════ */
(async function init() {
  const res = await fetch('/api/admin?action=check');
  const data = await res.json();
  if (data.ok) {
    _authed = true;
    showPanel();
  }
})();

/* ════ LOGIN ════ */
async function doLogin() {
  var btn = document.getElementById('login-btn');
  var err = document.getElementById('login-err');
  var pwd = document.getElementById('pwd-input').value;
  if (!pwd) return;
  btn.disabled = true;
  btn.textContent = 'Accesso…';
  err.style.display = 'none';
  try {
    var res = await fetch('/api/admin?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    var data = await res.json();
    if (data.ok) {
      _authed = true;
      showPanel();
    } else {
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Accedi';
    }
  } catch (e) {
    err.textContent = 'Errore di rete. Riprova.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Accedi';
  }
}

/* ════ LOGOUT ════ */
async function doLogout() {
  await fetch('/api/admin?action=logout', { method: 'POST' });
  location.reload();
}

/* ════ SHOW PANEL ════ */
async function showPanel() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
  document.getElementById('tb-user').style.display = 'flex';

  /* Carica cover admin e galleria in parallelo */
  const [coversRes, galleryRes] = await Promise.all([
    fetch('/api/admin?action=get_covers'),
    fetch('/api/gallery')
  ]);
  const coversData = await coversRes.json();
  const galleryData = await galleryRes.json();

  _covers = coversData.covers || {};
  _pages  = galleryData.pages || [];

  renderGalleryGrid();
}

/* ════ RENDER GRID ════ */
function renderGalleryGrid() {
  var grid = document.getElementById('gallery-grid');
  if (!_pages.length) {
    grid.innerHTML = '<div class="admin-loading">Nessuna scheda trovata.</div>';
    return;
  }

  grid.innerHTML = _pages.map(function(p) {
    var customCover = _covers[p.id] || '';
    var displayCover = customCover || '';
    var hasCustom = !!customCover;
    var tagLabel = p.tags && p.tags.length ? p.tags[0] : '';
    var colBg = getClassBg(p.tags);

    return '<div class="pg-card" id="pgcard-' + p.id + '">'
      + '<div class="pg-card-preview" style="' + (!displayCover ? colBg : '') + '">'
      + (displayCover
          ? '<div class="pg-card-preview-img" id="previewimg-' + p.id + '" style="background-image:url(\'' + displayCover + '\')"></div>'
          : '<div class="pg-card-preview-img" id="previewimg-' + p.id + '"></div><span>' + p.icon + '</span>'
        )
      + '<div class="pg-card-overlay"></div>'
      + (tagLabel ? '<div class="pg-card-tag">' + tagLabel + '</div>' : '')
      + '<div class="pg-card-custom-badge' + (hasCustom ? ' vis' : '') + '" id="badge-' + p.id + '">✓ Custom</div>'
      + '</div>'
      + '<div class="pg-card-body">'
      + '<div class="pg-card-name">' + p.title + '</div>'
      + '<div class="cover-input-wrap">'
      + '<input class="cover-input" id="input-' + p.id + '" type="url"'
      + ' placeholder="URL immagine copertina…"'
      + ' value="' + (customCover || '') + '"'
      + ' oninput="previewCover(\'' + p.id + '\')" />'
      + '<div class="cover-actions">'
      + '<button class="cover-btn cover-btn-save" onclick="saveCover(\'' + p.id + '\')">Salva</button>'
      + '<button class="cover-btn cover-btn-remove" onclick="removeCover(\'' + p.id + '\')" title="Rimuovi cover custom">✕</button>'
      + '</div>'
      + '<div class="cover-status" id="status-' + p.id + '"></div>'
      + '</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

/* ════ PREVIEW LIVE ════ */
function previewCover(id) {
  var val = document.getElementById('input-' + id).value.trim();
  var img = document.getElementById('previewimg-' + id);
  if (img) {
    img.style.backgroundImage = val ? 'url(\'' + val + '\')' : '';
  }
}

/* ════ SALVA COVER ════ */
async function saveCover(id) {
  var input = document.getElementById('input-' + id);
  var status = document.getElementById('status-' + id);
  var badge  = document.getElementById('badge-' + id);
  var url = input.value.trim();

  status.textContent = 'Salvataggio…';
  status.className = 'cover-status';

  try {
    var res = await fetch('/api/admin?action=set_cover', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pageId: id, coverUrl: url })
    });
    var data = await res.json();
    if (data.ok) {
      _covers[id] = url;
      status.textContent = url ? '✓ Salvata' : '✓ Rimossa';
      status.className = 'cover-status ok';
      if (badge) badge.classList.toggle('vis', !!url);
      showToast('Cover aggiornata ✓');
    } else {
      status.textContent = '✕ Errore';
      status.className = 'cover-status err';
    }
  } catch (e) {
    status.textContent = '✕ Errore di rete';
    status.className = 'cover-status err';
  }

  setTimeout(function() { status.textContent = ''; status.className = 'cover-status'; }, 3000);
}

/* ════ RIMUOVI COVER ════ */
async function removeCover(id) {
  var input = document.getElementById('input-' + id);
  var img   = document.getElementById('previewimg-' + id);
  input.value = '';
  if (img) img.style.backgroundImage = '';
  await saveCover(id);
}

/* ════ HELPERS ════ */
function getClassBg(tags) {
  if (!tags || !tags.length) return 'background:#0a0c14';
  var t = tags[0].toLowerCase();
  if (t.indexOf('fighter') > -1)   return 'background:linear-gradient(135deg,#1a0602,#2a0804)';
  if (t.indexOf('ranger') > -1)    return 'background:linear-gradient(135deg,#021a06,#042a0a)';
  if (t.indexOf('wizard') > -1)    return 'background:linear-gradient(135deg,#02061a,#040a28)';
  if (t.indexOf('rogue') > -1)     return 'background:linear-gradient(135deg,#120216,#1c0420)';
  if (t.indexOf('cleric') > -1)    return 'background:linear-gradient(135deg,#1a1402,#281e04)';
  if (t.indexOf('barbarian') > -1) return 'background:linear-gradient(135deg,#1a0802,#280e04)';
  if (t.indexOf('bard') > -1)      return 'background:linear-gradient(135deg,#1a0210,#280418)';
  if (t.indexOf('paladin') > -1)   return 'background:linear-gradient(135deg,#141202,#201c04)';
  if (t.indexOf('monk') > -1)      return 'background:linear-gradient(135deg,#021414,#041e1e)';
  if (t.indexOf('druid') > -1)     return 'background:linear-gradient(135deg,#061402,#0a1e04)';
  if (t.indexOf('warlock') > -1)   return 'background:linear-gradient(135deg,#0c0218,#140422)';
  if (t.indexOf('sorcerer') > -1)  return 'background:linear-gradient(135deg,#180202,#240404)';
  if (t.indexOf('artificer') > -1) return 'background:linear-gradient(135deg,#021018,#041820)';
  return 'background:#0a0c14';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('vis');
  setTimeout(function() { t.classList.remove('vis'); }, 2500);
}
</script>
</body>
</html>
