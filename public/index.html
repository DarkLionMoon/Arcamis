<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il tuo Sito</title>
<style>
  :root { --gold: #ffcc00; --gold-dark: #e6b800; --bg-dark: #0f0f1a; }
  body { margin:0; font-family: Arial, sans-serif; background:var(--bg-dark); color:#fff; }

  /* Header */
  header { display:flex; justify-content:flex-end; align-items:center; padding:10px 20px; background:#11141d; position:fixed; top:0; width:100%; z-index:100; box-shadow:0 2px 6px #000; }
  #tr { display:flex; gap:10px; align-items:center; }
  #ovbtn, .invite-btn { cursor:pointer; padding:8px 14px; background:var(--gold); color:#000; border-radius:6px; text-decoration:none; font-weight:bold; transition:0.3s; }
  #ovbtn:hover, .invite-btn:hover { background:var(--gold-dark); transform: scale(1.05); }

  /* Animazioni pulsante */
  @keyframes shakeScaleColor {
    0%,100% { transform: translateX(0) scale(1); background: var(--gold); }
    20% { transform: translateX(-3px) scale(1.05); background: var(--gold-dark); }
    40% { transform: translateX(3px) scale(1.05); background: var(--gold-dark); }
    60% { transform: translateX(-3px) scale(1.05); background: var(--gold-dark); }
    80% { transform: translateX(3px) scale(1.05); background: var(--gold-dark); }
  }

  @keyframes pulseGold {
    0%,100% { box-shadow: 0 0 0px var(--gold); }
    50% { box-shadow: 0 0 15px var(--gold); }
  }

  #ovbtn.animate { animation: shakeScaleColor 0.6s ease infinite; }
  #ovbtn.pulse { animation: pulseGold 1s ease infinite; }

  /* Widget scorrevole */
  #widget-container { 
    position:fixed; top:60px; right:-370px; /* nascosto inizialmente */
    width:350px; height:500px; border:2px solid var(--gold); border-radius:8px; overflow:hidden; 
    box-shadow:0 0 20px var(--gold); transition:right 0.4s ease, box-shadow 0.3s ease; z-index:1000;
  }
  #widget-container.active { right:20px; box-shadow:0 0 30px var(--gold-dark); }
  iframe { display:block; width:100%; height:100%; }

  /* Overlay */
  #overlay { 
    position:fixed; top:0; left:0; width:100%; height:100%; display:none; z-index:900; 
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(2px);
  }

  /* Main content */
  main { padding:100px 20px 20px 20px; }
  section#galleria { margin-top:40px; }
</style>
</head>
<body>

<header>
  <div id="tr">
    <!-- Pulsante apri widget -->
    <div id="ovbtn" title="Apri widget Discord">Discord</div>
    <!-- Pulsante invito -->
    <a href="https://discord.gg/JZPnXZbXEJ" target="_blank" class="invite-btn">Entra nel server</a>
  </div>
</header>

<!-- Overlay invisibile -->
<div id="overlay"></div>

<!-- Container widget scorrevole -->
<div id="widget-container">
  <iframe src="https://discord.com/widget?id=1348723468157456425&theme=dark" 
          allowtransparency="true" frameborder="0" 
          sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
  </iframe>
</div>

<main>
  <h1>Benvenuto sul nostro sito!</h1>
  <p>Qui puoi aggiungere tutto il contenuto originale: testo, immagini, gallerie, ecc.</p>
  <section id="galleria">
    <h2>Galleria</h2>
    <p>Le immagini della galleria appariranno qui.</p>
  </section>
</main>

<script>
  const ovbtn = document.getElementById('ovbtn');
  const widget = document.getElementById('widget-container');
  const overlay = document.getElementById('overlay');

  // Funzioni animazione pulsante
  function startAnimation() {
    if(!widget.classList.contains('active')){
      ovbtn.classList.add('animate');
    }
  }
  function stopAnimation() { ovbtn.classList.remove('animate'); }

  // Animazione pulsante lampeggio gold dopo 10s se widget chiuso
  function startPulse() {
    if(!widget.classList.contains('active')){
      ovbtn.classList.add('pulse');
    }
  }
  function stopPulse() { ovbtn.classList.remove('pulse'); }

  // Ripete shake ogni 6 secondi
  setInterval(startAnimation, 6000);
  // Timer pulse dopo 10 secondi di inattività
  let pulseTimer = setTimeout(startPulse, 10000);

  ovbtn.addEventListener('click', () => {
    const isActive = widget.classList.contains('active');
    if(!isActive){
      widget.classList.add('active');
      overlay.style.display = 'block';
      stopAnimation();
      stopPulse();
      clearTimeout(pulseTimer);
    } else {
      widget.classList.remove('active');
      overlay.style.display = 'none';
      startAnimation();
      pulseTimer = setTimeout(startPulse, 10000);
    }
  });

  overlay.addEventListener('click', () => {
    widget.classList.remove('active');
    overlay.style.display = 'none';
    startAnimation();
    pulseTimer = setTimeout(startPulse, 10000);
  });
</script>

</body>
</html>
