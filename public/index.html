<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Arcamis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
    <style>
        /* Qui c'è tutto il tuo CSS originale (root, body, topbar, cards, overlay) */
        /* ... (Immagina qui tutto il tuo codice CSS non toccato) ... */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
          --bg: #080a0e; --bg2: #0c0f15; --bg3: #10141c; --bg4: #161c26;
          --bdr: #241e0e; --bdr2: #342c14; --gold: #c89b3c; --gold3: #e8c86a;
          --parch: #c4a862; --text: #a08848; --text2: #786438; --text3: #483c1c;
          --white: #f0e6d2; --topbar-h:58px;
        }
        body{ font-family:'Crimson Pro',serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
        #topbar{ height:var(--topbar-h); border-bottom:1px solid var(--bdr); display:flex; z-index:200; background:#04050a; }
        #main{ flex:1; overflow-y:auto; position:relative; z-index:1; }
        .cgrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(185px,1fr)); gap:12px; margin-bottom:36px; }
        .lcard{ background:var(--bg3); border:1px solid var(--bdr); cursor:pointer; transition:all .22s; position:relative; overflow:hidden; }
        .cthumb{ height:96px; background-size:cover; background-position:center; background-color:var(--bg4); }
        .cinfo{ padding:10px 12px 12px; }
        .ctitle{ font-family:'Cinzel',serif; font-size:12.5px; font-weight:700; color:var(--parch); }
        .ctag{ font-family:'Cinzel',serif; font-size:9px; padding:2px 8px; background:rgba(200,155,60,.08); color:var(--gold); border:1px solid rgba(200,155,60,0.2); margin-top:5px; display:inline-block; }
        
        #overlay{ position:fixed; inset:0; z-index:1000; display:none; background:rgba(4,5,10,.7); backdrop-filter:blur(16px); }
        #ovpanel{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:min(820px,95vw); background:rgba(12,16,22,.98); border:1px solid var(--bdr2); display:flex; flex-direction:column; }
        #ovbody{ display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--bdr); }
        .ovsec{ background:var(--bg2); padding:20px; }
        .ovlink{ display:flex; align-items:center; gap:10px; padding:9px 12px; background:rgba(255,255,255,.02); border:1px solid var(--bdr); margin-bottom:6px; cursor:pointer; color:var(--text); font-size:13px; text-decoration:none; }
        .n-cp{ display:inline-flex; align-items:center; padding:10px 18px; background:var(--bg3); border:1px solid var(--bdr); color:var(--parch); cursor:pointer; text-decoration:none; }
        .spin{ width:24px; height:24px; border:2px solid var(--bdr2); border-top-color:var(--gold); border-radius:50%; animation:sp .8s linear infinite; margin:auto; }
        @keyframes sp{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div id="topbar">
  <div id="topbar-logo" onclick="location.reload()" style="display:flex; align-items:center; padding:0 22px; cursor:pointer;">
    <span style="font-family:'Cinzel'; color:var(--gold3); letter-spacing:.2em;">ARCAMIS</span>
  </div>
  <div style="margin-left:auto; display:flex; align-items:center; padding:0 16px;">
    <div id="ov-btn" onclick="openOv()" style="cursor:pointer; border:1px solid var(--bdr); padding:7px 12px; font-size:10px; font-family:'Cinzel';">MENU <span style="opacity:0.5; margin-left:5px;">⇧Tab</span></div>
  </div>
</div>

<div id="main">
  <div id="home-hero" style="height:300px; display:flex; align-items:center; justify-content:center; background:linear-gradient(to bottom, #0d1420, #080a0e);">
    <h1 style="font-family:'Cinzel'; font-size:48px; color:var(--gold3); letter-spacing:8px;">ARCAMIS</h1>
  </div>

  <div id="hbody" style="padding:40px; max-width:1100px; margin:0 auto;">
    <div class="shead" style="color:var(--gold); font-family:'Cinzel'; font-size:10px; margin-bottom:15px;">✦ GALLERIA PERSONAGGI</div>
    
    <div class="cgrid" id="pg-gallery">
      <div style="grid-column:1/-1; text-align:center; padding:40px;"><div class="spin"></div></div>
    </div>
  </div>
</div>

<div id="overlay">
  <div id="ovpanel">
    <div style="display:flex; justify-content:space-between; padding:15px 20px; border-bottom:1px solid var(--bdr);">
      <div style="font-family:'Cinzel'; font-size:12px; color:var(--gold2);">MENU RAPIDO</div>
      <div onclick="closeOv()" style="cursor:pointer; color:var(--text3);">✕</div>
    </div>
    <div id="ovbody">
      <div class="ovsec" id="discord-widget-container">
        <div style="font-family:'Cinzel'; font-size:9px; color:var(--text3); margin-bottom:10px;">SERVER DISCORD</div>
        <div class="spin"></div>
      </div>

      <div class="ovsec">
        <div style="font-family:'Cinzel'; font-size:9px; color:var(--text3); margin-bottom:10px;">LINK RAPIDI</div>
        <div class="ovlinks">
          <a href="#" class="ovlink">⚔️ Gameplay</a>
          <a href="#" class="ovlink">📜 Regole</a>
          <a href="#" class="ovlink">🎭 Classi</a>
          <a href="https://discord.gg/a3mvUnBV53" target="_blank" class="ovlink" style="border-color:var(--gold); color:var(--gold2);">🍻 Entra nella Locanda</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const DISCORD_ID = '1129325983808401428'; 

// 1. Funzione Widget Discord (Overlay)
async function refreshDiscord() {
    const container = document.getElementById('discord-widget-container');
    try {
        const r = await fetch(`https://discord.com/api/guilds/${DISCORD_ID}/widget.json`);
        const d = await r.json();
        container.innerHTML = `
            <div style="font-family:'Cinzel'; font-size:9px; color:var(--text3); margin-bottom:10px;">SERVER DISCORD</div>
            <div style="background:var(--bg3); border:1px solid var(--bdr2); padding:15px; text-align:center;">
                <div style="font-family:'Cinzel'; font-size:28px; color:var(--gold3);">${d.presence_count}</div>
                <div style="font-size:9px; color:#8ab840; letter-spacing:1px; margin-bottom:15px;">AVVENTURIERI ONLINE</div>
                <div style="text-align:left; max-height:100px; overflow-y:auto; margin-bottom:15px;">
                    ${d.members.slice(0,5).map(m => `<div style="font-size:12px; margin-bottom:4px; color:var(--parch);">• ${m.username}</div>`).join('')}
                </div>
                <a href="${d.instant_invite}" target="_blank" class="n-cp" style="width:100%; justify-content:center; font-size:11px;">ENTRA ORA</a>
            </div>`;
    } catch(e) { container.innerHTML = "Widget Discord non disponibile."; }
}

// 2. Funzione Galleria PG (Forum Discord)
// Nota: Questa funzione simula il caricamento dei post. Per renderla reale serve il "ponte" Vercel di cui parlavamo.
async function loadGallery() {
    const gallery = document.getElementById('pg-gallery');
    // Qui sotto emulo la struttura che riceveresti dal forum
    const mockData = [
        { name: "Phonarla", tag: "Paladin", img: "https://i.imgur.com/your_img1.jpg" },
        { name: "Ivarek Stivkan", tag: "Sorcerer", img: "https://i.imgur.com/your_img2.jpg" },
        { name: "Nebula", tag: "Warlock", img: "https://i.imgur.com/your_img3.jpg" }
    ];

    gallery.innerHTML = mockData.map(pg => `
        <div class="lcard">
            <div class="cthumb" style="background-image:url('${pg.img}')"></div>
            <div class="cinfo">
                <div class="ctitle">${pg.name}</div>
                <div class="ctag">${pg.tag}</div>
            </div>
        </div>
    `).join('');
}

// Gestione Overlay
function openOv() {
    document.getElementById('overlay').style.display = 'block';
    refreshDiscord();
}
function closeOv() {
    document.getElementById('overlay').style.display = 'none';
}

// Inizializzazione
window.onload = () => {
    loadGallery();
    document.addEventListener('keydown', e => {
        if(e.shiftKey && e.key === 'Tab') { e.preventDefault(); openOv(); }
    });
};
</script>

</body>
</html>
