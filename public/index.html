<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARCAMIS</title>
  <style>
    :root {
      --gold: #f1c40f;
      --bg: #0a0d14;
      --text: #ffffff;
    }
    body {
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    /* TOPBAR */
    #topbar {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 20px;
      background:#11141d;
      position:fixed;
      top:0;
      width:100%;
      z-index:9999;
    }
    #tlogo {
      display:flex;
      align-items:center;
      cursor:pointer;
    }
    #liw { display:flex; align-items:center; }
    #li { height:24px; width:24px; }
    #lf { margin-left:5px; font-weight:bold; }
    #tlt { margin-left:10px; font-size:1.2em; font-weight:bold; }
    #tnav { display:flex; gap:15px; }
    .tn { cursor:pointer; padding:5px 10px; border-radius:4px; transition:0.2s; }
    .tn:hover { background:var(--gold); color:#000; }
    #tr { display:flex; align-items:center; gap:10px; }
    #sw { position:relative; }
    #ts { padding:5px; border-radius:4px; border:none; }
    #ovbtn {
      display:flex;
      align-items:center;
      gap:5px;
      padding:5px 10px;
      background:var(--gold);
      color:#000;
      border-radius:4px;
      cursor:pointer;
      transition:0.2s;
    }
    #ovbtn:hover { background:#d4ac0d; }
    /* WIDGET DISCORD */
    #discord-widget {
      display:none;
      position:fixed;
      top:56px;
      right:20px;
      width:350px;
      height:500px;
      z-index:10000;
      border:2px solid var(--gold);
      border-radius:4px;
      overflow:hidden;
      box-shadow:0 12px 36px rgba(0,0,0,0.7);
      background:#0a0d14;
      transition:all 0.3s ease;
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div id="topbar">
    <div id="tlogo" onclick="showHome()">
      <div id="liw"><img id="li" alt=""/><span id="lf">⚔</span></div>
      <span id="tlt">ARCAMIS</span>
    </div>
    <nav id="tnav">
      <div class="tn" data-v="home" onclick="showHome()">Home</div>
      <div class="tn" data-v="gameplay" onclick="gp('2f00274fdc1c8065a11ff45192aa5dcb','Gameplay','⚔️')">Gameplay</div>
      <div class="tn" data-v="regole" onclick="gp('2f00274fdc1c800b9d8fc366e8e40c5c','Regole','📜')">Regole</div>
      <div class="tn" data-v="classi" onclick="gp('30a0274fdc1c804ab56bd3943add26d2','Classi','🎭')">Classi</div>
      <div class="tn" data-v="pantheon" onclick="gp('2f00274fdc1c80679bd3c3df8a1fa040','Pantheon','🛐')">Pantheon</div>
      <div class="tn" data-v="changelog" onclick="gp('3000274fdc1c8033a214c44a1aa7f01f','Changelog','📝')">Changelog</div>
    </nav>
    <div id="tr">
      <div id="sw">
        <span id="si">⌕</span>
        <input id="ts" type="text" placeholder="Cerca…" autocomplete="off" oninput="ds(this.value)" onblur="setTimeout(cs,200)"/>
        <div id="sr"></div>
      </div>
      <!-- Pulsante Discord -->
      <div id="ovbtn" onclick="toggleDiscordWidget()" title="Apri widget Discord">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
          <rect x="1" y="1" width="6" height="6" rx="1" opacity=".7"/>
          <rect x="9" y="1" width="6" height="6" rx="1"/>
          <rect x="1" y="9" width="6" height="6" rx="1"/>
          <rect x="9" y="9" width="6" height="6" rx="1" opacity=".7"/>
        </svg>
        Discord
      </div>
    </div>
  </div>

  <!-- WIDGET DISCORD -->
  <div id="discord-widget">
    <iframe src="https://discord.com/widget?id=1348723468157456425&theme=dark" width="100%" height="100%" allowtransparency="true" frameborder="0" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>
  </div>

  <!-- CONTENUTO PRINCIPALE -->
  <main style="padding-top:80px;">
    <h1>Benvenuti ad Arcamis</h1>
    <p>Qui va tutto il contenuto del sito...</p>
  </main>

  <script>
    function toggleDiscordWidget() {
      const widget = document.getElementById('discord-widget');
      if(widget.style.display === 'none' || widget.style.display === '') {
        widget.style.display = 'block';
      } else {
        widget.style.display = 'none';
      }
    }
    function showHome() { console.log('Torna home'); }
    function gp(id,title,emoji) { console.log(id,title,emoji); }
    function ds(val) { console.log('Cerca:',val); }
    function cs() { console.log('Chiudi ricerca'); }
  </script>
</body>
</html>
