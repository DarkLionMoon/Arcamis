<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arcamis — Wiki</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #080604;
  --bg2:      #110e09;
  --bg3:      #1c1610;
  --bg4:      #241c12;
  --border:   #3a2e1e;
  --gold:     #c9942a;
  --gold2:    #e8b84b;
  --gold3:    #f5d98a;
  --text:     #e2ceaa;
  --text2:    #a89070;
  --text3:    #6a5840;
  --red:      #8b2020;
  --red2:     #c43030;
  --sidebar-w: 280px;
  --header-h:  60px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 17px;
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold); }

/* ── Header ── */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: linear-gradient(180deg, #0d0a06 0%, rgba(8,6,4,0.95) 100%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
  padding: 0 20px;
  z-index: 1000;
  backdrop-filter: blur(8px);
}

#header::after {
  content: '';
  position: absolute; bottom: -3px; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), var(--gold2), var(--gold), transparent);
  opacity: 0.6;
}

#hamburger {
  display: none;
  flex-direction: column; justify-content: space-between;
  width: 24px; height: 18px;
  cursor: pointer; border: none; background: none; padding: 0;
}
#hamburger span {
  display: block; height: 2px;
  background: var(--gold); border-radius: 2px;
  transition: all 0.3s;
}

#logo {
  font-family: 'Cinzel Decorative', serif;
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold3) 50%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.08em;
  text-decoration: none;
  cursor: pointer;
  user-select: none;
}

#search-wrap {
  margin-left: auto;
  position: relative;
}
#search {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text);
  font-family: 'EB Garamond', serif;
  font-size: 15px;
  padding: 6px 14px 6px 36px;
  width: 200px;
  outline: none;
  transition: border-color 0.2s, width 0.3s;
}
#search:focus { border-color: var(--gold); width: 260px; }
#search::placeholder { color: var(--text3); }
#search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text3); font-size: 14px; pointer-events: none;
}

/* ── Layout ── */
#layout {
  display: flex;
  padding-top: var(--header-h);
  min-height: 100vh;
}

/* ── Sidebar ── */
#sidebar {
  position: fixed;
  top: var(--header-h); bottom: 0; left: 0;
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  overflow-x: hidden;
  z-index: 900;
  transition: transform 0.3s ease;
}

#sidebar-inner { padding: 16px 0 40px; }

.nav-section {
  margin-bottom: 4px;
}

.nav-section-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 18px;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  cursor: pointer;
  user-select: none;
  transition: color 0.2s;
}
.nav-section-header:hover { color: var(--gold); }
.nav-section-header .arrow {
  margin-left: auto;
  font-size: 10px;
  transition: transform 0.25s;
  opacity: 0.6;
}
.nav-section.open > .nav-section-header .arrow { transform: rotate(90deg); }

.nav-children { display: none; }
.nav-section.open > .nav-children { display: block; }

.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 18px 7px 28px;
  font-size: 15px;
  color: var(--text2);
  cursor: pointer;
  user-select: none;
  border-left: 2px solid transparent;
  transition: all 0.18s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.nav-item:hover { color: var(--text); background: var(--bg3); }
.nav-item.active {
  color: var(--gold2);
  border-left-color: var(--gold);
  background: var(--bg4);
}
.nav-item .icon { flex-shrink: 0; width: 18px; text-align: center; }

.nav-divider {
  height: 1px;
  background: var(--border);
  margin: 10px 18px;
  opacity: 0.4;
}

/* ── Main content ── */
#main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-width: 0;
}

#content-area {
  max-width: 800px;
  margin: 0 auto;
  padding: 48px 48px 80px;
}

/* ── Page header ── */
#page-header {
  margin-bottom: 40px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
#page-header::after {
  content: '';
  position: absolute; bottom: -4px; left: 0;
  width: 80px; height: 3px;
  background: linear-gradient(90deg, var(--gold), transparent);
  border-radius: 2px;
}

#page-icon {
  font-size: 48px;
  line-height: 1;
  margin-bottom: 14px;
  display: block;
}

#page-title {
  font-family: 'Cinzel', serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--gold3);
  letter-spacing: 0.04em;
  line-height: 1.2;
  text-shadow: 0 0 40px rgba(201,148,42,0.25);
}

/* ── Notion Block Styles ── */
.notion-content > * + * { margin-top: 0.6em; }

.n-p { line-height: 1.75; color: var(--text); }
.n-p:empty { min-height: 1.2em; }

.n-h1 {
  font-family: 'Cinzel', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--gold2);
  margin-top: 1.6em !important;
  margin-bottom: 0.3em;
  letter-spacing: 0.03em;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}
.n-h2 {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--gold);
  margin-top: 1.4em !important;
  margin-bottom: 0.2em;
  letter-spacing: 0.02em;
}
.n-h3 {
  font-family: 'Cinzel', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-top: 1.2em !important;
  margin-bottom: 0.1em;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.9;
}

.n-ul, .n-ol {
  padding-left: 24px;
  color: var(--text);
}
.n-ul { list-style: none; }
.n-ul > li { position: relative; padding-left: 16px; }
.n-ul > li::before {
  content: '◆';
  position: absolute; left: -4px;
  color: var(--gold);
  font-size: 8px;
  top: 8px;
}
.n-ol { list-style: decimal; }
.n-ol > li { padding-left: 4px; }
.n-ol > li::marker { color: var(--gold); }

.n-quote {
  border-left: 3px solid var(--gold);
  padding: 10px 18px;
  margin: 12px 0;
  background: var(--bg3);
  border-radius: 0 6px 6px 0;
  color: var(--text2);
  font-style: italic;
}

.n-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 28px 0;
  position: relative;
}
.n-divider::before {
  content: '✦';
  position: absolute;
  left: 50%; transform: translateX(-50%) translateY(-50%);
  background: var(--bg2);
  color: var(--gold);
  padding: 0 10px;
  font-size: 12px;
}

.n-callout {
  display: flex; gap: 12px; align-items: flex-start;
  background: var(--bg4);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 18px;
  margin: 10px 0;
}
.n-callout-icon { flex-shrink: 0; font-size: 20px; margin-top: 1px; }
.n-callout-body { flex: 1; }

.n-toggle-summary {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
  user-select: none;
  list-style: none;
  font-weight: 500;
  color: var(--text);
  padding: 4px 0;
}
.n-toggle-summary::before {
  content: '▶';
  font-size: 10px;
  color: var(--gold);
  transition: transform 0.2s;
  flex-shrink: 0;
}
details[open] > .n-toggle-summary::before { transform: rotate(90deg); }
.n-toggle-children {
  padding: 6px 0 4px 20px;
  border-left: 1px solid var(--border);
  margin-left: 6px;
}

.n-code {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 18px;
  overflow-x: auto;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  color: var(--gold3);
  line-height: 1.5;
}

.n-image {
  margin: 16px 0;
  text-align: center;
}
.n-image img {
  max-width: 100%;
  border-radius: 8px;
  border: 1px solid var(--border);
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.n-image figcaption {
  margin-top: 8px;
  font-size: 14px;
  color: var(--text3);
  font-style: italic;
}

.n-child-page {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--gold);
  cursor: pointer;
  font-size: 15px;
  transition: all 0.2s;
  margin: 3px 0;
  text-decoration: none;
}
.n-child-page:hover {
  background: var(--bg4);
  border-color: var(--gold);
  color: var(--gold2);
  transform: translateX(4px);
}
.n-child-page::before { content: '↳'; color: var(--text3); }

.n-table-wrap { overflow-x: auto; margin: 14px 0; }
table.n-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 15px;
}
table.n-table th {
  background: var(--bg4);
  color: var(--gold2);
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 10px 14px;
  border: 1px solid var(--border);
  text-align: left;
}
table.n-table td {
  padding: 9px 14px;
  border: 1px solid var(--border);
  color: var(--text);
}
table.n-table tr:nth-child(even) td { background: var(--bg3); }
table.n-table tr:hover td { background: var(--bg4); }

.n-bookmark {
  display: flex; gap: 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  background: var(--bg3);
  margin: 10px 0;
  text-decoration: none;
  color: var(--text);
  transition: border-color 0.2s;
}
.n-bookmark:hover { border-color: var(--gold); }
.n-bookmark-url { font-size: 13px; color: var(--gold); margin-top: 4px; }

.n-columns {
  display: grid;
  gap: 20px;
  margin: 12px 0;
}

/* Rich text inline styles */
.rt-bold { font-weight: 700; color: var(--text); }
.rt-italic { font-style: italic; }
.rt-strike { text-decoration: line-through; opacity: 0.7; }
.rt-underline { text-decoration: underline; }
.rt-code {
  font-family: 'Courier New', monospace;
  font-size: 0.88em;
  background: var(--bg4);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  color: var(--gold3);
}
.rt-link { color: var(--gold); text-decoration: underline; text-underline-offset: 3px; cursor: pointer; }
.rt-link:hover { color: var(--gold2); }

/* Color classes */
.rt-red { color: #e06060; }
.rt-orange { color: #e0904a; }
.rt-yellow { color: #e0c040; }
.rt-green { color: #60b060; }
.rt-blue { color: #6090d0; }
.rt-purple { color: #9060c0; }
.rt-pink { color: #d060a0; }
.rt-gray { color: var(--text3); }
.rt-brown { color: #a07050; }

/* ── Loading ── */
#loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px 20px;
  gap: 20px;
  color: var(--text3);
}
.loader {
  width: 40px; height: 40px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 0.1em; }

/* ── Welcome screen ── */
#welcome {
  text-align: center;
  padding: 60px 20px;
}
.welcome-rune {
  font-size: 80px;
  display: block;
  margin-bottom: 24px;
  animation: float 4s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.welcome-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 38px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold), var(--gold3), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
  line-height: 1.2;
}
.welcome-sub {
  font-size: 18px;
  color: var(--text2);
  font-style: italic;
  margin-bottom: 40px;
}
.welcome-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  max-width: 600px;
  margin: 0 auto;
}
.welcome-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 16px;
  cursor: pointer;
  transition: all 0.22s;
  text-align: center;
}
.welcome-card:hover {
  border-color: var(--gold);
  background: var(--bg4);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(201,148,42,0.1);
}
.welcome-card .card-icon { font-size: 32px; margin-bottom: 8px; }
.welcome-card .card-label {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text2);
}

/* ── Error ── */
#error-msg {
  background: rgba(139,32,32,0.15);
  border: 1px solid var(--red);
  border-radius: 8px;
  padding: 20px 24px;
  color: #e08080;
  font-family: 'Cinzel', serif;
  font-size: 14px;
}

/* ── Overlay for mobile ── */
#overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 850;
  backdrop-filter: blur(2px);
}

/* ── Responsive ── */
@media (max-width: 768px) {
  :root { --sidebar-w: 260px; }
  #hamburger { display: flex; }
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  #overlay.show { display: block; }
  #main { margin-left: 0; }
  #content-area { padding: 32px 20px 60px; }
  #page-title { font-size: 24px; }
  .welcome-title { font-size: 28px; }
  #search { width: 150px; }
  #search:focus { width: 180px; }
}

@media (max-width: 480px) {
  #content-area { padding: 24px 16px 50px; }
}

/* ── Page enter animation ── */
.page-enter {
  animation: pageIn 0.35s ease forwards;
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Breadcrumb ── */
#breadcrumb {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 24px;
  font-size: 13px;
  color: var(--text3);
  font-family: 'Cinzel', serif;
  letter-spacing: 0.04em;
  flex-wrap: wrap;
}
#breadcrumb span { cursor: pointer; transition: color 0.2s; }
#breadcrumb span:hover { color: var(--gold); }
#breadcrumb .sep { opacity: 0.4; }
#breadcrumb .current { color: var(--text2); cursor: default; }
</style>
</head>
<body>

<!-- Header -->
<header id="header">
  <button id="hamburger" onclick="toggleSidebar()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div id="logo" onclick="showWelcome()">Arcamis</div>
  <div id="search-wrap">
    <span id="search-icon">🔍</span>
    <input id="search" type="text" placeholder="Cerca nella wiki…" oninput="onSearch(this.value)"/>
  </div>
</header>

<!-- Overlay -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- Layout -->
<div id="layout">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div id="sidebar-inner"></div>
  </nav>

  <!-- Main -->
  <main id="main">
    <div id="content-area">
      <div id="breadcrumb"></div>
      <div id="page-content">
        <div id="welcome"></div>
      </div>
    </div>
  </main>

</div>

<script>
// ─────────────────────────────────────────────
// Navigation structure (IDs without dashes for Notion API)
// ─────────────────────────────────────────────
const NAV = [
  { label: 'Regolamento', icon: '⚖️', open: true, children: [
    { label: 'Gameplay',            icon: '⚔️', id: '2f00274fdc1c8065a11ff45192aa5dcb' },
    { label: 'Regole',              icon: '📜', id: '2f00274fdc1c800b9d8fc366e8e40c5c' },
    { label: 'Materiale approvato', icon: '📋', id: '3130274fdc1c807eb61fde24e8236659' },
  ]},
  { label: 'Personaggio', icon: '🧙', open: true, children: [
    { label: 'Come si inizia',  icon: '🌟', id: '2dd222f22ef8413f8cb48f03bbb4f4b0' },
    { label: 'Andando avanti', icon: '📈', id: '5cea525d149f4acb9c59007bf6b3d5ff' },
    { label: 'Classi',         icon: '🎭', id: '30a0274fdc1c804ab56bd3943add26d2' },
    { label: 'Galleria PG',    icon: '🖼️', id: '2fd0274fdc1c80d8b948c4133f874f28' },
  ]},
  { label: 'Lavori', icon: '🛠️', open: false, children: [
    { label: 'Biblioteca',                  icon: '📚', id: '2f00274fdc1c8089bfe6c24434d53b67' },
    { label: 'Bottega farmaceutica',        icon: '💊', id: '2f00274fdc1c801c9697e75caa8d5f13' },
    { label: 'Caserma',                     icon: '🛡️', id: '2ff0274fdc1c80688dd6c2b293a1f626' },
    { label: 'Corporazione costruttori',    icon: '🔨', id: '2ff0274fdc1c80769a4ae243f22f0582' },
    { label: 'Forgia',                      icon: '🔥', id: '2f00274fdc1c805ca01ec57f18d2ffee' },
    { label: 'Gilda degli avventurieri',    icon: '🗡️', id: '2f00274fdc1c801b8c13cefd9e15694e' },
    { label: 'Locanda',                     icon: '🍺', id: '2f00274fdc1c80faa99eda064ef0fabc' },
    { label: 'Ospedale',                    icon: '⚕️', id: '2f00274fdc1c807aa03cc6cbeb3687cc' },
    { label: 'Sartoria',                    icon: '🧵', id: '2ff0274fdc1c8035bad4f0b6ab705192' },
  ]},
  { label: 'Pantheon',   icon: '🛐', id: '2f00274fdc1c80679bd3c3df8a1fa040' },
  { label: 'Changelog',  icon: '📝', id: '3000274fdc1c8033a214c44a1aa7f01f' },
];

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let currentPageId = null;
let allNavItems = [];  // flat list for search

// ─────────────────────────────────────────────
// Sidebar render
// ─────────────────────────────────────────────
function buildSidebar() {
  const inner = document.getElementById('sidebar-inner');
  inner.innerHTML = '';

  function renderItem(item, depth = 0) {
    if (item.children) {
      const sec = document.createElement('div');
      sec.className = 'nav-section' + (item.open ? ' open' : '');
      sec.innerHTML = `
        <div class="nav-section-header" onclick="toggleSection(this.parentElement)">
          <span>${item.icon}</span>
          <span>${item.label}</span>
          <span class="arrow">▶</span>
        </div>
        <div class="nav-children"></div>
      `;
      if (item.id) {
        sec.querySelector('.nav-section-header').addEventListener('click', (e) => {
          // only navigate if clicking on the label text area, not arrow
        });
      }
      item.children.forEach(child => {
        sec.querySelector('.nav-children').appendChild(renderItem(child, depth + 1));
      });
      inner.appendChild(sec);
      return sec;
    } else {
      const el = document.createElement('div');
      el.className = 'nav-item';
      el.dataset.id = item.id;
      el.innerHTML = `<span class="icon">${item.icon}</span><span>${item.label}</span>`;
      el.onclick = () => loadPage(item.id, item.label, item.icon);
      allNavItems.push({ id: item.id, label: item.label, icon: item.icon, el });
      return el;
    }
  }

  NAV.forEach(item => {
    if (item.children) {
      const sec = document.createElement('div');
      sec.className = 'nav-section' + (item.open ? ' open' : '');
      sec.innerHTML = `
        <div class="nav-section-header" onclick="toggleSection(this.parentElement)">
          <span>${item.icon}</span>
          <span>${item.label}</span>
          <span class="arrow">▶</span>
        </div>
        <div class="nav-children"></div>
      `;
      item.children.forEach(child => {
        const childEl = renderItem(child, 1);
        sec.querySelector('.nav-children').appendChild(childEl);
      });
      inner.appendChild(sec);
    } else {
      const el = document.createElement('div');
      el.className = 'nav-item';
      el.dataset.id = item.id;
      el.innerHTML = `<span class="icon">${item.icon}</span><span>${item.label}</span>`;
      el.onclick = () => loadPage(item.id, item.label, item.icon);
      allNavItems.push({ id: item.id, label: item.label, icon: item.icon, el });
      inner.appendChild(el);
    }
  });
}

function toggleSection(el) {
  el.classList.toggle('open');
}

function setActiveNav(pageId) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === pageId);
  });
}

// ─────────────────────────────────────────────
// Search
// ─────────────────────────────────────────────
function onSearch(q) {
  const query = q.toLowerCase().trim();
  if (!query) {
    document.querySelectorAll('.nav-item').forEach(el => el.style.display = '');
    document.querySelectorAll('.nav-section').forEach(el => el.style.display = '');
    return;
  }
  allNavItems.forEach(({ label, el }) => {
    el.style.display = label.toLowerCase().includes(query) ? '' : 'none';
  });
  document.querySelectorAll('.nav-section').forEach(sec => {
    const visible = [...sec.querySelectorAll('.nav-item')].some(el => el.style.display !== 'none');
    sec.style.display = visible ? '' : 'none';
    if (visible) sec.classList.add('open');
  });
}

// ─────────────────────────────────────────────
// Mobile
// ─────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ─────────────────────────────────────────────
// Rich text renderer
// ─────────────────────────────────────────────
function renderRichText(richTexts) {
  if (!richTexts || richTexts.length === 0) return '';
  return richTexts.map(rt => {
    let text = rt.plain_text || '';
    text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const a = rt.annotations || {};
    const classes = [];
    if (a.bold) classes.push('rt-bold');
    if (a.italic) classes.push('rt-italic');
    if (a.strikethrough) classes.push('rt-strike');
    if (a.underline) classes.push('rt-underline');
    if (a.code) classes.push('rt-code');
    if (a.color && a.color !== 'default') {
      const c = a.color.replace('_background','');
      classes.push('rt-' + c);
    }
    const href = rt.href;
    if (href) {
      // Check if it's an internal Notion page link
      const notionMatch = href.match(/([a-f0-9]{32})(?:\?|$)/);
      if (notionMatch) {
        const pid = notionMatch[1];
        const navItem = allNavItems.find(n => n.id === pid);
        const tag = classes.length ? `<span class="${classes.join(' ')}">${text}</span>` : text;
        return `<a class="rt-link" onclick="loadPage('${pid}','${navItem?.label||''}','${navItem?.icon||'📄'}')">${tag}</a>`;
      }
      const tag = classes.length ? `<span class="${classes.join(' ')}">${text}</span>` : text;
      return `<a href="${href}" target="_blank" rel="noopener" class="rt-link">${tag}</a>`;
    }
    if (classes.length === 0) return text;
    return `<span class="${classes.join(' ')}">${text}</span>`;
  }).join('');
}

// ─────────────────────────────────────────────
// Block renderer
// ─────────────────────────────────────────────
function renderBlocks(blocks, numbered = {}) {
  if (!blocks || blocks.length === 0) return '';
  let html = '';

  for (let i = 0; i < blocks.length; i++) {
    const block = blocks[i];
    const type = block.type;
    const data = block[type] || {};

    switch (type) {
      case 'paragraph': {
        const content = renderRichText(data.rich_text);
        html += `<p class="n-p">${content || '<br>'}</p>`;
        break;
      }
      case 'heading_1':
        html += `<h2 class="n-h1">${renderRichText(data.rich_text)}</h2>`;
        break;
      case 'heading_2':
        html += `<h3 class="n-h2">${renderRichText(data.rich_text)}</h3>`;
        break;
      case 'heading_3':
        html += `<h4 class="n-h3">${renderRichText(data.rich_text)}</h4>`;
        break;

      case 'bulleted_list_item': {
        const children = block.children ? renderBlocks(block.children) : '';
        html += `<ul class="n-ul"><li>${renderRichText(data.rich_text)}${children}</li></ul>`;
        break;
      }
      case 'numbered_list_item': {
        const children = block.children ? renderBlocks(block.children) : '';
        html += `<ol class="n-ol"><li>${renderRichText(data.rich_text)}${children}</li></ol>`;
        break;
      }
      case 'quote': {
        const children = block.children ? renderBlocks(block.children) : '';
        html += `<blockquote class="n-quote">${renderRichText(data.rich_text)}${children}</blockquote>`;
        break;
      }
      case 'divider':
        html += `<hr class="n-divider"/>`;
        break;

      case 'callout': {
        const icon = data.icon?.emoji || data.icon?.external?.url || '💡';
        const iconHtml = icon.startsWith('http')
          ? `<img src="${icon}" style="width:20px;height:20px;object-fit:contain;"/>`
          : icon;
        const children = block.children ? renderBlocks(block.children) : '';
        html += `<div class="n-callout">
          <div class="n-callout-icon">${iconHtml}</div>
          <div class="n-callout-body">${renderRichText(data.rich_text)}${children}</div>
        </div>`;
        break;
      }

      case 'toggle': {
        const children = block.children ? renderBlocks(block.children) : '';
        html += `<details>
          <summary class="n-toggle-summary">${renderRichText(data.rich_text)}</summary>
          <div class="n-toggle-children">${children}</div>
        </details>`;
        break;
      }

      case 'code': {
        const lang = data.language || '';
        const code = (data.rich_text || []).map(rt => rt.plain_text).join('');
        html += `<pre class="n-code" data-lang="${lang}"><code>${code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;
        break;
      }

      case 'image': {
        let src = '';
        if (data.type === 'external') src = data.external?.url || '';
        else if (data.type === 'file') src = data.file?.url || '';
        const caption = renderRichText(data.caption);
        if (src) {
          html += `<figure class="n-image">
            <img src="${src}" alt="${caption || 'immagine'}" loading="lazy" onerror="this.parentElement.style.display='none'"/>
            ${caption ? `<figcaption>${caption}</figcaption>` : ''}
          </figure>`;
        }
        break;
      }

      case 'child_page': {
        const title = data.title || 'Pagina';
        const pid = block.id.replace(/-/g, '');
        const navItem = allNavItems.find(n => n.id === pid);
        const icon = navItem?.icon || '📄';
        html += `<div class="n-child-page" onclick="loadPage('${pid}','${title}','${icon}')">
          <span>${icon}</span> ${title}
        </div>`;
        break;
      }

      case 'child_database': {
        const title = data.title || 'Database';
        html += `<div class="n-callout">
          <div class="n-callout-icon">🗃️</div>
          <div class="n-callout-body"><em>${title}</em> <span style="color:var(--text3);font-size:13px;">(database)</span></div>
        </div>`;
        break;
      }

      case 'table': {
        const rows = block.children || [];
        const hasColHeader = data.has_column_header;
        const hasRowHeader = data.has_row_header;
        let thtml = `<div class="n-table-wrap"><table class="n-table"><tbody>`;
        rows.forEach((row, ri) => {
          const cells = row.table_row?.cells || [];
          thtml += '<tr>';
          cells.forEach((cell, ci) => {
            const isHeader = (hasColHeader && ri === 0) || (hasRowHeader && ci === 0);
            const tag = isHeader ? 'th' : 'td';
            thtml += `<${tag}>${renderRichText(cell)}</${tag}>`;
          });
          thtml += '</tr>';
        });
        thtml += `</tbody></table></div>`;
        html += thtml;
        break;
      }

      case 'column_list': {
        const cols = block.children || [];
        const count = cols.length || 1;
        html += `<div class="n-columns" style="grid-template-columns:repeat(${count},1fr)">`;
        cols.forEach(col => {
          html += `<div>${renderBlocks(col.children || [])}</div>`;
        });
        html += `</div>`;
        break;
      }

      case 'bookmark': {
        const url = data.url || '#';
        const caption = renderRichText(data.caption);
        const domain = (() => { try { return new URL(url).hostname; } catch { return url; } })();
        html += `<a href="${url}" target="_blank" rel="noopener" class="n-bookmark">
          <div>
            <div>${caption || domain}</div>
            <div class="n-bookmark-url">${url}</div>
          </div>
        </a>`;
        break;
      }

      case 'to_do': {
        const checked = data.checked ? '✅' : '☐';
        html += `<p class="n-p">${checked} ${renderRichText(data.rich_text)}</p>`;
        break;
      }

      case 'embed':
      case 'video': {
        const url = data.url || data.external?.url || data.file?.url || '';
        if (url) {
          html += `<a href="${url}" target="_blank" rel="noopener" class="n-bookmark">
            <div>
              <div>🔗 Contenuto embed</div>
              <div class="n-bookmark-url">${url}</div>
            </div>
          </a>`;
        }
        break;
      }

      default:
        // Skip unsupported blocks silently
        break;
    }
  }

  // Merge consecutive lists
  const div = document.createElement('div');
  div.innerHTML = html;
  mergeLists(div, 'ul');
  mergeLists(div, 'ol');
  return div.innerHTML;
}

function mergeLists(container, tag) {
  const lists = container.querySelectorAll(tag + '.' + (tag === 'ul' ? 'n-ul' : 'n-ol'));
  lists.forEach(list => {
    const prev = list.previousElementSibling;
    if (prev && prev.tagName === tag.toUpperCase() && prev.className === list.className) {
      while (list.firstChild) prev.appendChild(list.firstChild);
      list.remove();
    }
  });
}

// ─────────────────────────────────────────────
// Page loader
// ─────────────────────────────────────────────
async function loadPage(pageId, label, icon) {
  if (!pageId) return;
  currentPageId = pageId;
  closeSidebar();
  setActiveNav(pageId);

  // Update breadcrumb
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = `
    <span onclick="showWelcome()">🏰 Arcamis</span>
    <span class="sep">›</span>
    <span class="current">${icon} ${label}</span>
  `;

  const pc = document.getElementById('page-content');
  pc.innerHTML = `
    <div id="loading">
      <div class="loader"></div>
      <p>Caricamento in corso…</p>
    </div>
  `;

  try {
    const res = await fetch(`/api/notion?pageId=${pageId}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const { page, blocks } = await res.json();

    // Get title and icon from page
    const titleProp = page.properties?.title?.title || [];
    const pageTitle = titleProp.map(t => t.plain_text).join('') || label;
    let pageIcon = icon;
    if (page.icon?.emoji) pageIcon = page.icon.emoji;
    else if (page.icon?.external?.url) pageIcon = `<img src="${page.icon.external.url}" style="height:48px;width:48px;object-fit:contain;"/>`;

    const blocksHtml = renderBlocks(blocks);

    pc.innerHTML = `
      <div class="page-enter">
        <div id="page-header">
          <span id="page-icon">${pageIcon}</span>
          <h1 id="page-title">${pageTitle}</h1>
        </div>
        <div class="notion-content">${blocksHtml || '<p class="n-p" style="color:var(--text3);font-style:italic;">Pagina vuota o contenuto non disponibile.</p>'}</div>
      </div>
    `;

    // Scroll to top
    document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
    window.scrollTo({ top: 0, behavior: 'smooth' });

  } catch (err) {
    pc.innerHTML = `
      <div id="error-msg">
        ⚠️ Impossibile caricare la pagina: ${err.message}<br>
        <small style="opacity:0.7">Assicurati che NOTION_TOKEN sia configurato su Vercel.</small>
      </div>
    `;
  }
}

    { label: 'Classi',   icon: '🎭', id: '30a0274fdc1c804ab56bd3943add26d2' },
    { label: 'Lavori',   icon: '🛠️', id: null },
    { label: 'Pantheon', icon: '🛐', id: '2f00274fdc1c80679bd3c3df8a1fa040' },
    { label: 'Changelog',icon: '📝', id: '3000274fdc1c8033a214c44a1aa7f01f' },
  ];

function openSection(label) {
  document.querySelectorAll('.nav-section-header').forEach(h => {
    if (h.textContent.includes(label)) {
      const sec = h.parentElement;
      sec.classList.add('open');
      h.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  });
}

// Init
// ─────────────────────────────────────────────
buildSidebar();
showWelcome();

// Handle URL hash navigation
function handleHash() {
  const hash = location.hash.slice(1);
  if (hash) {
    const item = allNavItems.find(n => n.id === hash);
    if (item) loadPage(item.id, item.label, item.icon);
  }
}
window.addEventListener('hashchange', handleHash);
handleHash();
